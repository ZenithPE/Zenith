name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@2.32.0
        with:
          php-version: "8.1"
          extensions: igbinary, yaml, pmmp/ext-encoding@1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Load Composer package cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/composer"
          key: "php-8.1-composer-${{ hashFiles('**/composer.json') }}"
          restore-keys: "php-8.1-composer-"

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --ignore-platform-reqs

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyze --no-progress

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@2.32.0
        with:
          php-version: "8.1"
          extensions: igbinary, yaml, pmmp/ext-encoding@1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Load Composer package cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/composer"
          key: "php-8.1-composer-${{ hashFiles('**/composer.json') }}"
          restore-keys: "php-8.1-composer-"

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --ignore-platform-reqs

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit --bootstrap vendor/autoload.php --fail-on-warning tests/phpunit
